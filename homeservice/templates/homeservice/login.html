{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#2d347d;
            --muted:#6c7280;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            min-height:100vh;
            position: relative;
            overflow: hidden;
        }

        /* Background Image */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("{% static 'images/appliance2.png' %}") center center / cover no-repeat;
            
            transform: scale(1.03);
            z-index: -2;
        }

        /* Soft Dark Overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* Glass Login Card */
        .auth-card {
            border-radius: 18px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 70px rgba(0,0,0,0.2);
        }

        .brand {
            font-weight: 700;
            font-size: 26px;
            color: var(--primary);
        }

        .muted {
            color: var(--muted);
        }

        .form-control {
            border-radius: 10px;
            transition: 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(45,52,125,0.15);
        }

        .input-group-text {
            background:#fff;
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            border-radius: 10px;
            font-size: 17px;
            padding: 10px 0;
            transition: 0.2s ease;
        }

        .btn-primary:hover {
            background: #24305a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
    </style>
</head>

<body>

<main class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <div class="auth-card">

                    <div class="d-flex align-items-center mb-4">
                        <div class="me-3">
                            <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                                <rect width="24" height="24" rx="6" fill="#2d347d"/>
                                <path d="M7 12h10M7 8h10M7 16h6"
                                      stroke="white"
                                      stroke-width="1.3"
                                      stroke-linecap="round"
                                      stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div>
                            <div class="brand">HomeFix Pro</div>
                            <div class="muted small">Sign in to your account</div>
                        </div>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input class="form-control"
                                       type="text"
                                       name="username"
                                       placeholder="Email"
                                       required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <input class="form-control"
                                       type="password"
                                       name="password"
                                       id="login-password"
                                       placeholder="Password"
                                       required>
                                <span class="input-group-text"
                                      style="cursor:pointer"
                                      onclick="togglePassword()">
                                    <i class="bi bi-eye-slash" id="toggle-icon"></i>
                                </span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <a href="/forgot_password_customer/" class="text-decoration-none small fw-semibold">
                                Forgot password?
                            </a>
                            <a href="/register/" class="text-decoration-none small fw-semibold">
                                Create account
                            </a>
                        </div>

                        <div class="d-grid mb-3">
                            <button class="btn btn-primary btn-lg" type="submit">
                                Sign In
                            </button>
                        </div>

                        <a href="/" class="btn btn-outline-secondary w-100 mt-2">← Back to Home</a>

                        <p class="text-center small muted mt-3">
                            Are you a technician?
                            <a href="/technicianlogin/">Technician Login</a>
                        </p>
                    </form>

                </div>

            </div>
        </div>
    </div>
</main>

<script>
function togglePassword() {
    const field = document.getElementById("login-password");
    const icon = document.getElementById("toggle-icon");

    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        field.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

</body>
</html>
