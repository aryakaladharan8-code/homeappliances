<!-- Logout Confirmation Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 shadow-lg border-0">
      
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-danger">Confirm Logout</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body text-center">
        <p class="mb-3 fs-5">Are you sure you want to logout?</p>
        <p class="text-muted small">You will need to login again to access the panel.</p>
      </div>

      <div class="modal-footer border-0 justify-content-center pb-4">
        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>

        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">Yes, Logout</button>
        </form>
      </div>

    </div>
  </div>
</div>

<style>
  /* Small visual polish to match site */
  .modal-content { border-radius: 14px; }
  .modal-title { letter-spacing: 0.2px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function(){
  var logoutModalEl = document.getElementById('logoutModal');
  if (!logoutModalEl) return;

  // Ensure Bootstrap is available
  function initBootstrap(cb){
    if (window.bootstrap && window.bootstrap.Modal) return cb();
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js';
    s.onload = cb;
    document.body.appendChild(s);
  }

  initBootstrap(function(){
    var bsModal = new bootstrap.Modal(logoutModalEl);

    document.addEventListener('click', function(e){
      var trigger = e.target.closest && e.target.closest('.logout-trigger');
      if (trigger) {
        e.preventDefault();
        bsModal.show();
      }
    });
  });
});
</script>
