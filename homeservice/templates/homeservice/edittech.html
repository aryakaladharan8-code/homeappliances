<!DOCTYPE html>
<html>
<head>
    <title>Edit Technician Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="mb-3">
    <a href="{% url 'admindashboard' %}" class="admin-back me-2">← Dashboard</a>
    <a href="{% url 'technicians' %}" class="btn btn-secondary">← Back to List</a>
</div>

<h3>Edit Technician Status: {{ tech.name }}</h3>

<style>
    .admin-back { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; border:1px solid #eef2f8; background:#fff; color:#2d347d; font-weight:700; text-decoration:none; box-shadow:0 6px 20px rgba(47,63,88,0.04); transition:transform .12s ease; }
    .admin-back:hover { transform:translateY(-2px); }
</style>

<form method="POST">
    {% csrf_token %}

    <label class="form-label">Select New Status</label>
    <select name="status" class="form-control" required>
        <option value="">Choose...</option>
        <option value="approved" {% if tech.is_approved %}selected{% endif %}>Approved</option>
        <option value="rejected" {% if not tech.is_approved %}selected{% endif %}>Rejected</option>
    </select>

    <button class="btn btn-primary mt-3 w-100">Update</button>
</form>

</body>
</html>
