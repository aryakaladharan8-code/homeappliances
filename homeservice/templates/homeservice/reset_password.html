<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reset Password - Technician</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background: #f5f7fc; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
        .card { border-radius: 12px; box-shadow: 0 6px 20px rgba(20,20,50,0.06); }
        .brand { color: #2d347d; font-weight: 700; letter-spacing: .2px; }
        .small-muted { font-size: .9rem; color: #6b7280; }
        .input-group .form-control { background: #e6edff; border-right: none; }
        .input-group-text { background: #e6edff; border-left: none; cursor: pointer; }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-8 col-lg-5">
                <div class="card mt-5 p-4">

                    <div class="text-center mb-3">
                        <div class="brand fs-4">Reset Password</div>
                        <p class="small-muted mb-0">Enter your new password</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} text-center">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form action="{% url 'reset_password' token %}" method="POST" class="mt-3">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <input id="password" name="password" type="password" class="form-control" required placeholder="Enter new password">
                        </div>

                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <input id="confirm_password" name="confirm_password" type="password" class="form-control" required placeholder="Confirm new password">
                        </div>

                        <div class="d-grid mb-3">
                            <button class="btn btn-primary btn-lg" type="submit">Reset Password</button>
                        </div>

                        <div class="text-center">
                            <a href="{% url 'technicianlogin' %}" class="small-muted">Back to Login</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
