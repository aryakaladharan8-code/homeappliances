<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f7fc; font-family:'Inter', sans-serif; }
        .box { max-width:450px; margin:80px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.06); text-align:center; }
        h4 { font-weight:700; color:#2d347d; }
        p { color:#6b7280; }
    </style>
</head>

<body>
<div class="box">
    <h4>Log Out</h4>
    <p class="mb-4">Are you sure you want to log out from your account?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Yes, Log Out</button>
        <a href="/dashboard/" class="btn btn-outline-secondary px-4">Cancel</a>
    </form>
</div>
</body>
</html>
