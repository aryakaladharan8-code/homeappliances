<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Complete Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f5f7fc; font-family:'Inter', sans-serif; }
        .form-container { background:#fff; padding:30px; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.06); }
        h4 { color:#2d347d; font-weight:700; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-12">
            <div class="form-container">
    <h4>Complete Job</h4>

    <p><strong>Customer:</strong> {{ job.user.first_name }}</p>
    <p><strong>Service:</strong> {{ job.service_type }}</p>
    <p><strong>Problem:</strong> {{ job.problem_description }}</p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Service Amount (₹)</label>
            <input type="number" name="amount" class="form-control" step="0.01" required>
        </div>

        <button class="btn btn-success">
            Generate Invoice & Complete
        </button>

        <a href="{% url 'techniciandashboard' %}" class="btn btn-secondary ms-2">
            Cancel
        </a>
    </form>
</div>
        </div>
    </div>
</div>

</body>
</html>
