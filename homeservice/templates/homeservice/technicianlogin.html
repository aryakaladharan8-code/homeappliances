{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Technician Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root{
        --primary:#2d347d;
        --muted:#6c7280;
    }

    body {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto;
        min-height:100vh;
        position: relative;
        overflow: hidden;
    }

    /* Same Background Image */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url("{% static 'images/appliance2.png' %}") center center / cover no-repeat;
        transform: scale(1.03);
        z-index: -2;
    }

    /* Dark Overlay */
    body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.25);
        z-index: -1;
    }

    /* Glass Card */
    .card {
        border-radius: 18px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 25px 70px rgba(0,0,0,0.2);
    }

    .brand {
        color: var(--primary);
        font-weight: 800;
        font-size: 1.4rem;
    }

    .small-muted {
        font-size: .9rem;
        color: var(--muted);
    }

    .form-control {
        border-radius: 10px;
        transition: 0.2s ease;
    }

    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 5px 15px rgba(45,52,125,0.15);
    }

    .input-group-text {
        background:#fff;
        cursor: pointer;
    }

    .btn-primary {
        background: var(--primary);
        border-color: var(--primary);
        border-radius: 10px;
        transition: 0.2s ease;
    }

    .btn-primary:hover {
        background: #24305a;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-8 col-lg-5">

      <div class="card mt-5">

        <div class="text-center mb-4">
          <div class="brand">Technician Portal</div>
        </div>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} text-center">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form action="{% url 'technicianlogin' %}" method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control"
                   required autocomplete="email" placeholder="you@example.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="input-group">
              <input id="password" name="password" type="password"
                     class="form-control"
                     required autocomplete="current-password"
                     placeholder="your password">

              <span class="input-group-text" id="togglePass">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </span>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <input id="remember" name="remember" type="checkbox">
              <label for="remember" class="form-check-label ms-1 small-muted">
                remember me
              </label>
            </div>
            <div>
              <a href="{% url 'forgot_password' %}" class="small-muted">forgot?</a>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
              Login
          </button>

          <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100 mt-2">← Back to Home</a>

          <div class="text-center mt-3 small-muted">
            Not a technician?
            <a href="{% url 'techniciansignup' %}" class="ms-1">Sign up</a>
          </div>

        </form>

        <div class="text-center mt-3 small-muted">
          <small>For security: do NOT share your credentials</small>
        </div>

      </div>

      <p class="text-center text-muted mt-3 small">© HomeFix Pro</p>

    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggle = document.getElementById('togglePass');
  const pass = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  toggle.addEventListener('click', function() {
    if (pass.type === 'password') {
      pass.type = 'text';
      eyeIcon.classList.remove('fa-eye');
      eyeIcon.classList.add('fa-eye-slash');
    } else {
      pass.type = 'password';
      eyeIcon.classList.remove('fa-eye-slash');
      eyeIcon.classList.add('fa-eye');
    }
  });
});
</script>

</body>
</html>
